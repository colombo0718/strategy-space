<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sentence Summoner — Battle</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>">
<script src="deck.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{ height:100% }
  body{ font-family:"Segoe UI","Noto Sans TC",sans-serif; color:#eee; display:flex; overflow:hidden }

  /* ═══ 左 6：棋盤 ═══ */
  .left{ flex:6; min-width:0; height:100vh; display:flex; flex-direction:column; padding:8px 12px;
    background:radial-gradient(900px 620px at 50% 45%, #2f5d44 0%, #1b3327 62%, #12211a 100%) }
  .summoner{ display:flex; align-items:center; gap:10px; padding:2px 4px; flex:0 0 auto }
  .por{ width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:23px;border:2px solid;background:#0004 }
  .opp .por{ border-color:#e58b7d } .me .por{ border-color:#8fd7a0 }
  .sname{ font-size:12px } .opp .sname{color:#e58b7d} .me .sname{color:#8fd7a0}
  .shpbar{ width:190px;height:15px;background:#0006;border-radius:8px;overflow:hidden;border:1px solid #000 }
  .shpfill{ height:100%;transition:width .3s } .opp .shpfill{background:linear-gradient(90deg,#e07a6a,#c94f3c)} .me .shpfill{background:linear-gradient(90deg,#5ac16a,#3a9d4a)}
  .shpnum{ font-size:11px } .turnpill{ margin-left:auto;font-size:11px;padding:3px 10px;border-radius:20px;background:#0005;color:#e7c873 }

  .board{ flex:1; display:flex; gap:7px; align-items:center; justify-content:center; min-height:0 }
  .slot{ width:90px;height:122px;border-radius:9px;border:2px dashed #ffffff22;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#ffffff2a;font-size:22px }
  .monwrap{ position:relative;width:90px;height:122px;flex:0 0 auto }
  /* 形容詞疊卡（同 deck 堆疊 demo）：真卡 PNG 往上疊、怪獸壓最前，各露出上緣四維欄 */
  .monwrap .modcard{ position:absolute;left:0;width:90px;height:122px;border-radius:9px;overflow:hidden;box-shadow:0 2px 5px #0007;cursor:zoom-in }
  .monwrap .modcard img{ width:90px;height:122px;display:block }
  .mon{ width:90px;height:122px;border-radius:9px;position:absolute;top:0;left:0;cursor:zoom-in;transition:.12s;box-shadow:0 3px 7px #0007 }
  .mon img{ width:100%;height:100%;border-radius:9px;display:block }
  .mon:hover{ transform:translateY(-4px);box-shadow:0 0 0 2px #ffffff55,0 5px 10px #0008 }
  .mon.used{ filter:grayscale(.6) brightness(.7) }
  .mhp{ position:absolute;bottom:3px;left:50%;transform:translateX(-50%);background:#111c;border:1px solid #000;border-radius:9px;font-size:10px;font-weight:800;padding:0 5px;color:#ff9;z-index:6 }
  .mhp b{ color:#7fe08a }

  /* 手牌區：棄牌 | 手牌(橫排微疊) | 牌庫 */
  .handzone{ flex:0 0 auto; display:flex; align-items:flex-end; justify-content:space-between; height:150px; padding:4px 34px 0 }
  .pile{ width:86px;height:117px;border-radius:9px;flex:0 0 auto;position:relative;display:flex;align-items:center;justify-content:center;font-size:11px;color:#cbb }
  .pile .cnt{ position:absolute;bottom:4px;left:50%;transform:translateX(-50%);background:#000b;border-radius:9px;padding:1px 7px;font-weight:800;color:#fff }
  .pile .lbl{ position:absolute;top:-16px;font-size:10px;color:#ffffff66 }
  .deck{ background:url(cardback.png) center/cover no-repeat;color:#e7c873;font-weight:900 }
  .discard{ border:2px dashed #ffffff2a; overflow:hidden } .discard img{ width:100%;height:100%;border-radius:7px;opacity:.55;filter:grayscale(.4) }
  .hand{ display:flex; align-items:flex-end }
  .hand .card{ width:94px;height:128px;border-radius:8px;margin-left:-22px;cursor:zoom-in;transition:.14s;box-shadow:0 4px 10px #0008 }
  .hand .card:first-child{ margin-left:0 }
  .hand .card img{ width:100%;height:100%;border-radius:8px;display:block }
  .hand .card:hover{ transform:translateY(-24px) scale(1.07);z-index:30;margin-right:14px }
  .hand.backs{ display:flex; align-items:flex-end }
  .cb{ width:94px;height:128px;border-radius:8px;margin-left:-22px;
    background:url(cardback.png) center/cover no-repeat;box-shadow:0 4px 10px #0008 }
  .cb:first-child{ margin-left:0 }
  .oppzone .hand .card:hover{ transform:translateY(24px) scale(1.07) } /* 對手在上、hover 往下展 */

  /* ═══ 右 4：LINE 式訊息框（白底）═══ */
  .right{ flex:4; min-width:300px; height:100vh; display:flex; flex-direction:column; background:#fff; border-left:1px solid #cdd6cf }
  .rtop{ padding:9px 12px; background:#e7efe8; border-bottom:1px solid #d5ddd6; font-size:13px; color:#3a5a44; letter-spacing:1px; font-weight:700 }
  .chat{ flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:7px; background:#eef2ee }
  .msg{ max-width:82%; padding:7px 11px; border-radius:14px; font-size:13px; line-height:1.4; word-break:break-word; box-shadow:0 1px 1px #0000000d }
  .msg.sys{ align-self:center; background:none; color:#8a938c; font-size:11px; max-width:100%; text-align:center; padding:2px; box-shadow:none }
  .msg.me{ align-self:flex-end; background:#8ce069; color:#173a12; border-bottom-right-radius:4px }
  .msg.ai{ align-self:flex-start; background:#fff; color:#333; border:1px solid #e2e2e2; border-bottom-left-radius:4px }
  .msg .sub{ font-size:10px; margin-top:2px; color:#3a6a2a } .msg.ai .sub{ color:#999 }

  .compose{ border-top:1px solid #d5ddd6; padding:10px 12px; background:#fafbfa }
  .inrow{ display:flex; gap:6px }
  input.say{ flex:1;min-width:0;background:#fff;border:1px solid #cbd3cc;color:#222;border-radius:20px;padding:10px 15px;font-size:15px }
  .btnrow{ display:flex; gap:6px; margin-top:8px }
  button{ border:0;border-radius:20px;padding:9px 12px;font-size:14px;font-weight:800;cursor:pointer }
  .mic{ background:#efeaf7;color:#6a4fa0;border-radius:50%;width:42px;height:42px;flex:0 0 auto;font-size:16px }
  .send{ background:#3a9d4a;color:#fff;flex:2 } .end{ background:#e0b84a;color:#4a3a10;flex:1 } .ghost{ background:#eef1f4;color:#556;border:1px solid #ccd3d8 }
  .hint{ font-size:11px;color:#9aa39c;text-align:center;margin-top:7px;line-height:1.5 }

  .ov{ position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:60 }
  #inspect{ background:#000b } #inspect>img{ height:72vh;max-width:92vw;border-radius:16px;box-shadow:0 12px 44px #000 }
  #inspect .stackview{ display:flex;align-items:center;justify-content:center } #inspect .stackview img{ border-radius:14px;box-shadow:0 10px 40px #000 }
  #banner{ background:#000c;flex-direction:column;gap:16px } #banner .big{ font-size:46px;font-weight:900;letter-spacing:4px }
</style>
</head>
<body>
  <!-- 左 6：棋盤 -->
  <div class="left">
    <div class="handzone opp oppzone">
      <div class="pile deck" id="oppDeck" title="對手牌庫"><span class="lbl">牌庫</span><span class="cnt" id="oppDeckCnt">0</span></div>
      <div class="hand backs" id="oppHand"></div>
      <div class="pile discard" id="oppDiscard" title="對手棄牌"><span class="lbl">棄牌</span><span class="cnt" id="oppDiscCnt">0</span></div>
    </div>
    <div class="summoner opp"><div class="por">🤖</div><div><div class="sname">AI 召喚師</div>
      <div class="shpbar"><div class="shpfill" id="oppHpF"></div></div></div><div class="shpnum" id="oppHpN"></div>
      <div class="turnpill" id="turnPill">你的回合</div></div>
    <div class="board opp" id="oppBoard"></div>
    <div class="board me" id="meBoard"></div>
    <div class="summoner me"><div class="por">🧑</div><div><div class="sname">你</div>
      <div class="shpbar"><div class="shpfill" id="meHpF"></div></div></div><div class="shpnum" id="meHpN"></div></div>
    <div class="handzone">
      <div class="pile discard" id="discard" title="棄牌區"><span class="lbl">棄牌</span><span class="cnt" id="discCnt">0</span></div>
      <div class="hand" id="hand"></div>
      <div class="pile deck" id="deck" title="牌庫"><span class="lbl">牌庫</span><span class="cnt" id="deckCnt">0</span></div>
    </div>
  </div>

  <!-- 右 4：LINE 式訊息框 -->
  <div class="right">
    <div class="rtop" id="rtop">📜 造句對話</div>
    <div class="chat" id="chat"></div>
    <div class="compose">
      <div class="inrow">
        <input class="say" id="say" placeholder="打一句話來行動…" autocomplete="off">
        <button class="mic" id="mic" title="CF Whisper 語音">🎤</button>
      </div>
      <div class="btnrow">
        <button class="send" id="send">✍️ 送出句子</button>
        <button class="end" id="end">結束回合 ⏭</button>
        <button class="ghost" id="reset" title="重開">🔄</button>
      </div>
      <div class="hint" id="playhint">召喚：寫出手牌<b>名詞</b>（如 <b>Cat</b>）　·　強化：<b>名詞＋形容詞</b>（如 <b>Strong Tiger</b>，永久疊在怪獸下）　·　攻擊：<b>你的怪獸＋攻擊動詞＋敵方</b>（如 <b>Cat bites Dragon</b>）　·　防禦：<b>你的怪獸＋防禦動詞</b>（如 <b>Penguin blocks</b>）<br>卡片點一下可放大看清楚</div>
    </div>
  </div>

  <div class="ov" id="inspect"><img alt=""></div>
  <div class="ov" id="banner"><div class="big" id="bigTxt"></div><button class="end" onclick="location.reload()">再來一局</button></div>

<script>
const D=window.SS_DECK, SRC=id=>`cards/${id}.png`;
const ALL=[...D.nouns,...D.verbs,...D.adjs];
ALL.forEach(c=>{ const _i=new Image(); _i.src=SRC(c.id); }); // 預載卡圖
const isNoun=c=>D.nouns.includes(c), isVerb=c=>D.verbs.includes(c), isAdj=c=>D.adjs.includes(c);
const shuffle=a=>{a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const $=i=>document.getElementById(i);
const MAXB=4, SUMHP=16;

// ── 模式（教學/訓練=攤牌；對戰=蓋牌）──
const MODE=(new URLSearchParams(location.search).get("mode"))||"training";
const MODE_NAME={teaching:"教學",training:"訓練",battle:"對戰"}[MODE]||"訓練";
const AI_OPEN = MODE!=="battle";
let S;

function bubble(kind,text,sub){ const d=document.createElement("div"); d.className="msg "+kind;
  d.innerHTML=text+(sub?`<div class="sub">${sub}</div>`:""); $("chat").appendChild(d); $("chat").scrollTop=$("chat").scrollHeight; }
const sys=t=>bubble("sys",t);
const inspect=id=>{ const ov=$("inspect"); ov.innerHTML=`<img src="${SRC(id)}" alt="">`; ov.style.display="flex"; };
// 有疊卡的怪獸：整組放大檢視（形容詞在上、名詞壓最下，各露上緣，同棋盤堆疊）
function inspectMon(m){ const mods=m.mods||[]; if(!mods.length){ inspect(m.id); return; }
  const ids=[m.id, ...mods.map(a=>a.id)];               // 名詞在左、形容詞往右橫向攤開
  const n=ids.length, vw=window.innerWidth, vh=window.innerHeight, gap=Math.round(vw*0.018);
  const CH=Math.round(Math.min(vh*0.8, ((vw*0.94-(n-1)*gap)/n)/0.726));   // 自動縮放：一排放得下
  const CW=Math.round(CH*0.726);
  const ov=$("inspect");
  ov.innerHTML=`<div class="stackview" style="gap:${gap}px">`+
    ids.map(id=>`<img src="${SRC(id)}" style="width:${CW}px;height:${CH}px">`).join("")+`</div>`;
  ov.style.display="flex"; }

function newMon(c,ready=false){ return {...c, chp:c.hp, used:!ready}; }

function deal(){
  S={ me:{hp:SUMHP,board:[],hand:[],deck:shuffle(ALL),discard:[]}, opp:{hp:SUMHP,board:[],hand:[],deck:shuffle(ALL),discard:[]}, turn:"me" };
  for(let i=0;i<5;i++){ S.me.hand.push(S.me.deck.shift()); S.opp.hand.push(S.opp.deck.shift()); }
  $("rtop").textContent=`📜 ${MODE_NAME}模式 · 造句對話`;
  $("chat").innerHTML=""; render();
  sys(`⚔️ ${MODE_NAME}模式開始 — 打倒對方召喚師（HP 歸 0）獲勝`);
  $("playhint").style.display = MODE==="battle" ? "none" : "block";
  if(MODE!=="battle"){ sys("🎮 你先召喚：打一句話寫出手牌裡的名詞（如 Cat）就能召喚牠上場；再說「形容詞＋名詞」（如 Strong Cat）可永久強化牠"); if(AI_OPEN) sys("（AI 手牌攤開、可偷看牠有什麼）"); }
}

// ── 渲染 ──
function monEl(m){ const wrap=document.createElement("div"); wrap.className="monwrap";
  const mods=m.mods||[], STEP=20;
  // 形容詞真卡 PNG 往上疊：怪獸(名詞)在最前最下、z 最高；每張形容詞露出上緣四維欄
  mods.forEach((a,i)=>{ const c=document.createElement("div"); c.className="modcard";
    c.style.top=(-(i+1)*STEP)+"px"; c.style.zIndex=String(mods.length-i); c.title=a.w;
    c.innerHTML=`<img src="${SRC(a.id)}" alt="${a.w}">`;
    c.onclick=e=>{ e.stopPropagation(); inspectMon(m); }; wrap.appendChild(c); });   // 點疊卡→看整組
  const d=document.createElement("div"); d.className="mon"+(m.used?" used":""); d.style.zIndex=String(mods.length+1);
  d.innerHTML=`<img src="${SRC(m.id)}"><span class="mhp">❤️<b>${Math.max(0,m.chp)}</b>/${m.hp}</span>`;
  d.onclick=()=>inspectMon(m); wrap.appendChild(d);   // 點怪獸→有疊卡就看整組、否則看單卡
  return wrap; }
function boardRow(side){ const box=$(side==="me"?"meBoard":"oppBoard"); box.innerHTML=""; const b=S[side].board;
  for(let i=0;i<MAXB;i++){ if(b[i])box.appendChild(monEl(b[i]));
    else{ const s=document.createElement("div"); s.className="slot"; s.textContent="＋"; box.appendChild(s); } } }
function faceCard(c){ const e=document.createElement("div"); e.className="card"; e.innerHTML=`<img src="${SRC(c.id)}">`; e.onclick=()=>inspect(c.id); return e; }
function render(){
  boardRow("opp"); boardRow("me");
  // 我方手牌（正面、可點放大）
  const h=$("hand"); h.innerHTML=""; S.me.hand.forEach(c=>h.appendChild(faceCard(c)));
  // 對手手牌：攤開=正面 / 蓋牌=卡背
  const oh=$("oppHand"); oh.innerHTML="";
  if(AI_OPEN){ oh.className="hand"; S.opp.hand.forEach(c=>oh.appendChild(faceCard(c))); }
  else { oh.className="hand backs"; S.opp.hand.forEach(()=>{ const e=document.createElement("div"); e.className="cb"; oh.appendChild(e); }); }
  $("oppHpF").style.width=Math.max(0,S.opp.hp/SUMHP*100)+"%"; $("oppHpN").textContent=Math.max(0,S.opp.hp);
  $("meHpF").style.width=Math.max(0,S.me.hp/SUMHP*100)+"%"; $("meHpN").textContent=Math.max(0,S.me.hp);
  $("deckCnt").textContent=S.me.deck.length; $("discCnt").textContent=S.me.discard.length;
  $("oppDeckCnt").textContent=S.opp.deck.length; $("oppDiscCnt").textContent=S.opp.discard.length;
  pileTop("discard",S.me.discard); pileTop("oppDiscard",S.opp.discard);
  $("turnPill").textContent=S.turn==="me"?"你的回合":"AI 回合";
}
function pileTop(id,arr){ const p=$(id); p.querySelectorAll("img").forEach(x=>x.remove());
  if(arr.length){ const im=document.createElement("img"); im.src=SRC(arr[arr.length-1].id); p.insertBefore(im,p.firstChild); } }

// ── 核心：句子驅動（裁判＝腳本，句中出現卡牌的字就發動）──
function submit(){
  if(S.turn!=="me") return;
  const text=$("say").value.trim(); if(!text) return;
  bubble("me", text);                         // 玩家寫的句子＝聊天泡泡
  $("say").value="";
  const words=text.toLowerCase().split(/[^a-z']+/).filter(Boolean);
  const has=w=>words.includes(w.toLowerCase());
  const vmatch=cw=>{const s=cw.toLowerCase().slice(0,Math.min(3,cw.length)); return words.some(w=>w.slice(0,s.length)===s);};
  const adjCard=S.me.hand.find(c=>isAdj(c)&&has(c.w));
  const verbCard=S.me.hand.find(c=>isVerb(c)&&vmatch(c.w));
  const nounCard=S.me.hand.find(c=>isNoun(c)&&has(c.w));

  // ── 形容詞：一句話「名詞＋形容詞」→ 永久強化，卡片常駐疊在怪獸下 ──
  if(adjCard){
    let mon=S.me.board.find(m=>has(m.w));               // 已在場、句中點名的怪獸
    if(!mon && nounCard){                                // 或順手召喚要被強化的名詞
      if(S.me.board.length>=MAXB){ sys(`你場上滿了（最多 ${MAXB} 隻），無法再召喚`); return; }
      mon=summon(nounCard);
    }
    if(!mon){ sys("形容詞要搭配「你的名詞」——同一句話裡也要出現名詞（例：<b>Strong Tiger</b>）"); return; }
    attachAdj(mon,adjCard);
    S.me.hand=S.me.hand.filter(x=>x!==adjCard);
    const eff=adjCard.eff.map(([ic,v])=>`${ic}${v>=0?"+":""}${v}`).join(" ");
    sys(`✨ ${mon.w} 疊上「${adjCard.w}」永久強化：${eff}（常駐）`); render(); return;
  }

  if(verbCard){                               // 有動詞字
    const subject=S.me.board.find(m=>!m.used&&has(m.w));
    if(!subject){ sys("句子裡要有你「場上、且本回合可行動」的怪獸（先召喚一隻）"); return; }
    const isAtk=verbCard.eff.some(e=>e[0]==="🗡️"&&e[1]>0);
    if(isAtk){                                // 攻擊動詞（帶 🗡️ 傷害）
      const target=S.opp.board.find(m=>has(m.w));
      if(!target && S.opp.board.length>0){ sys("敵方場上有怪獸擋著——句子裡要指定一隻敵方怪獸（先打倒牠們才能直擊召喚師）"); return; }
      resolveAttack(subject,verbCard,target||null); return;
    } else {                                  // 防禦/輔助動詞（🛡️🦶❤️）→ 對自己
      defendMove(subject,verbCard); return;
    }
  }
  if(nounCard){ if(S.me.board.length>=MAXB){ sys(`你場上滿了（最多 ${MAXB} 隻）`); } else summon(nounCard); return; }
  sys("沒對上任何手牌上的字——句子要包含手牌的單字（名詞召喚／名詞+形容詞強化／怪獸+動詞攻擊）");
}
function summon(c){ const m=newMon(c); S.me.board.push(m); S.me.hand=S.me.hand.filter(x=>x!==c);
  sys(`✨ 召喚【${c.w}】上場（本回合尚不能行動）`); render(); return m; }
// 形容詞永久附加到怪獸：直接調整數值 + 記錄卡片以便疊在下面渲染
function attachAdj(mon,adj){ mon.mods=mon.mods||[]; mon.mods.push(adj);
  for(const [ic,v] of adj.eff){
    if(ic==="❤️"){ mon.hp=Math.max(1,mon.hp+v); mon.chp=Math.max(1,mon.chp+v); }
    else if(ic==="🗡️") mon.atk=Math.max(0,mon.atk+v);
    else if(ic==="🛡️") mon.def=Math.max(0,mon.def+v);
    else if(ic==="🦶") mon.spd=Math.max(0,mon.spd+v);
  } }
function resolveAttack(sub,verb,target){
  const vA=(verb.eff.find(e=>e[0]==="🗡️")||[,0])[1], base=Math.max(1,sub.atk+(vA>0?vA:0));
  S.me.hand=S.me.hand.filter(x=>x!==verb); S.me.discard.push(verb);   // 動詞卡用掉
  if(target){
    const d=target.spd-sub.spd;
    if(d>=1 && (1+Math.floor(Math.random()*6))<=Math.min(d,5)){ sys(`🦶 ${target.w} 太快、閃過了！`); sub.used=true; render(); return; }
    const dmg=Math.max(1,base-target.def); target.chp-=dmg;
    sys(`💥 ${sub.w} ${verb.w.toLowerCase()} ${target.w}　−${dmg}`);
    if(target.chp<=0){ sys(`☠️ ${target.w} 倒下，進棄牌`); S.opp.discard.push(target,...(target.mods||[])); S.opp.board=S.opp.board.filter(m=>m!==target); }
  } else { S.opp.hp-=base; sys(`💥 ${sub.w} 直擊 AI 召喚師　−${base}`); if(S.opp.hp<=0)return win("🏆 你贏了！"); }
  sub.used=true; render();
}

function defendMove(sub,verb){   // 防禦/輔助動詞：強化自己（不攻擊）
  verb.eff.forEach(([ic,v])=>{ const st={"🛡️":"def","🦶":"spd","❤️":"hp"}[ic]; if(st){ sub[st]=Math.max(0,(sub[st]||0)+v); if(st==="hp")sub.chp+=v; } });
  S.me.hand=S.me.hand.filter(x=>x!==verb); S.me.discard.push(verb);
  const eff=verb.eff.map(([ic,v])=>`${ic}${v>=0?"+":""}${v}`).join(" ");
  sys(`🛡️ ${sub.w} 使出 ${verb.w}（防禦）：${eff}`); sub.used=true; render();
}

// ── AI 對手（先用模板「會出句子」；之後接 CF LLM）──
$("end").onclick=()=>{ if(S.turn!=="me")return; S.turn="opp"; render(); sys("— AI 回合 —"); setTimeout(aiTurn,700); };
function aiTurn(){ // TODO: 換 CF LLM 產生對手句子
  if(S.opp.deck.length&&S.opp.hand.length<7) S.opp.hand.push(S.opp.deck.shift());
  const rnd=a=>a[Math.floor(Math.random()*a.length)];
  if(S.opp.board.length<2){ const i=S.opp.hand.findIndex(isNoun); if(i>=0){ const n=S.opp.hand.splice(i,1)[0]; S.opp.board.push(newMon(n)); bubble("ai",`I summon ${n.w}.`); sys(`🤖 召喚【${n.w}】`); } }
  S.opp.board.forEach(m=>{ if(m.used)return; const vi=S.opp.hand.findIndex(c=>isVerb(c)&&c.eff.some(e=>e[0]==="🗡️"&&e[1]>0)); const v=vi>=0?S.opp.hand.splice(vi,1)[0]:{w:"Hit",eff:[["🗡️",2]]}; if(v.id)S.opp.discard.push(v);
    const vA=(v.eff.find(e=>e[0]==="🗡️")||[,0])[1], base=Math.max(1,m.atk+(vA>0?vA:0)), t=S.me.board[0];
    if(t){ const dmg=Math.max(1,base-t.def); t.chp-=dmg; bubble("ai",`${m.w} ${v.w.toLowerCase()}s ${t.w}.`); sys(`💥 ${m.w} → 你的 ${t.w}　−${dmg}`);
      if(t.chp<=0){ sys(`☠️ 你的 ${t.w} 倒下`); S.me.discard.push(t,...(t.mods||[])); S.me.board=S.me.board.filter(x=>x!==t); } }
    else { const dmg=base; S.me.hp-=dmg; bubble("ai",`${m.w} strikes your summoner!`); sys(`💥 直擊你　−${dmg}`); } });
  if(S.me.hp<=0)return win("AI 獲勝…再來一局");
  S.turn="me"; S.me.board.forEach(m=>m.used=false);
  if(S.me.deck.length&&S.me.hand.length<7){ S.me.hand.push(S.me.deck.shift()); sys("你的回合 — 抽了 1 張"); } else sys("你的回合");
  render();
}
function win(t){ $("bigTxt").textContent=t; $("bigTxt").style.color=t.includes("贏")?"#e7c873":"#e58b7d"; $("banner").style.display="flex"; }

$("send").onclick=submit;
$("mic").onclick=()=>sys("🎤 語音＝接 CF Whisper（未接，先用打字）");
$("reset").onclick=deal;
$("inspect").onclick=()=>$("inspect").style.display="none";
$("say").addEventListener("keydown",e=>{ if(e.key==="Enter") submit(); });
deal();
</script>
